version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: loanapp
      POSTGRES_PASSWORD: loanapp
      POSTGRES_DB: loanapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  application_service:
    build: ./apps/application_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://loanapp:loanapp@postgres:5432/loanapp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      - postgres
      - redis

  decision_engine:
    build: ./apps/decision_engine
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  document_service:
    build: ./apps/document_service
    ports:
      - "8003:8003"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
    depends_on:
      - minio

  payment_service:
    build: ./apps/payment_service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://loanapp:loanapp@postgres:5432/loanapp
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:
